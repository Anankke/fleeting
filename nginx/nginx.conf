worker_processes auto;

events {
  worker_connections 4096;
}

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  tcp_nopush    on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain application/json application/javascript text/css text/event-stream;

  # Docker embedded DNS — re-resolve app hostname every 5 s, IPv4 only.
  resolver 127.0.0.11 ipv6=off valid=5s;

  server {
    listen 80;
    server_name _;

    # Upstream address as a variable forces per-request DNS re-resolution,
    # so nginx recovers automatically when the app container restarts.
    set $app_upstream http://app:3000;

    # ── Static files from Rsbuild output ─────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
      try_files $uri $uri/ /index.html;
    }

    # ── Nchan SSE subscriber endpoint ─────────────────────────────────────────
    # Pilots and commanders subscribe: GET /sub/fleet/:id
    # War Cmdr multiplexed:            GET /sub/fleet/id1,id2,id3
    location ~ ^/sub/fleet/(.+)$ {
      nchan_subscriber;
      nchan_channel_id "$1";
      nchan_channel_id_split_delimiter ",";
      nchan_authorize_request /api/nchan/auth;
      nchan_subscriber_first_message oldest;
      add_header Cache-Control no-cache;
      add_header X-Accel-Buffering no;
    }

    # ── Nchan publisher endpoint (internal only) ───────────────────────────────
    location ~ ^/pub/fleet/(.+)$ {
      allow 127.0.0.1;
      allow 172.16.0.0/12;  # Docker internal network
      deny  all;
      nchan_publisher;
      nchan_channel_id "$1";
      nchan_message_buffer_length 10;
      nchan_message_timeout 30s;
    }

    # ── Nchan authorize callback → Fastify ────────────────────────────────────
    location = /api/nchan/auth {
      internal;
      proxy_pass $app_upstream;
      proxy_pass_request_body off;
      proxy_set_header Content-Length "";
      proxy_set_header X-Original-URI $request_uri;
    }

    # ── All /api/* requests → Fastify ─────────────────────────────────────────
    location /api/ {
      proxy_pass $app_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Auth routes → Fastify ─────────────────────────────────────────────────
    location /auth/ {
      proxy_pass $app_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
